services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: amazon_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always
    networks:
      - amazon_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:alpine
    container_name: amazon_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_amazon:/data
    restart: always
    networks:
      - amazon_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: amazon_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - amazon_network


  prometheus:
    image: prom/prometheus:latest
    container_name: amazon_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: always
    networks:
      - amazon_network
    depends_on:
      - redis_exporter


  grafana:
    image: grafana/grafana:latest
    container_name: amazon_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data_amazon:/var/lib/grafana
    restart: always
    networks:
      - amazon_network
    depends_on:
      - prometheus


  data_ingestion:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile
    container_name: amazon_data_ingestion
    command: >
      bash -c "
        if [ -f data/processed/amazon_fashion_cleaned.parquet ]; then
          echo 'Processed data already exists, skipping ETL.';
        else
          python -m src.pipelines.data_ingestion;
        fi
      "
    restart: "no"
    volumes:
      - ./data:/app/data
    networks:
      - amazon_network


  train:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: amazon_trainer
    user: root
    command: >
      bash -c "
        ([ -f models/amazon_word2vec.model ] && echo 'Word2Vec exists, skipping.' || python -m src.models.train_word2vec) &&
        ([ -f models/amazon_item2vec.model ] && echo 'Item2Vec exists, skipping.' || python -m src.models.train_item2vec) &&
        ([ -f models/amazon_lstm.pth ]       && echo 'LSTM exists, skipping.'     || python -m src.models.train_lstm_autocomplete)
      "
    restart: "no"
    depends_on:
      data_ingestion:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - amazon_network


  etl:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: amazon_etl_worker
    user: root
    command: bash -c "python -m src.pipelines.vector_ingestion && python -m src.pipelines.vector_ingestion_w2v"
    restart: "no"
    depends_on:
      qdrant:
        condition: service_healthy
      train:
        condition: service_completed_successfully
    environment:
      - QDRANT_HOST=qdrant
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - amazon_network


  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: amazon_api
    ports:
      - "8001:8001"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      etl:
        condition: service_completed_successfully
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    restart: always
    networks:
      - amazon_network


  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: amazon_ui
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8001
    restart: always
    networks:
      - amazon_network


volumes:
  redis_data_amazon:
  grafana_data_amazon:

networks:
  amazon_network:
    driver: bridge
